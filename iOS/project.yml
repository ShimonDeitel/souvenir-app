name: Souvenir Book
options:
  bundleIdPrefix: com.shimondeitel.souvenirbook
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Souvenir Book:
    type: application
    platform: iOS
    sources:
      - path: Souvenir Book
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.souvenirbook
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Souvenir Book/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Souvenir BookTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Souvenir BookTests
      - path: Souvenir Book.storekit
    dependencies:
      - target: Souvenir Book
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.souvenirbook.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Souvenir BookUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Souvenir BookUITests
    dependencies:
      - target: Souvenir Book
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.souvenirbook.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Souvenir Book:
    build:
      targets:
        Souvenir Book: all
        Souvenir BookTests: [test]
        Souvenir BookUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Souvenir Book.storekit
    test:
      config: Debug
      storeKitConfiguration: Souvenir Book.storekit
      targets:
        - Souvenir BookTests
        - Souvenir BookUITests
    archive:
      config: Release
